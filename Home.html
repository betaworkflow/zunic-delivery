<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ซูนิค — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
:root {
  --bg:        #f0ece3;
  --surface:   #faf8f4;
  --surface2:  #f5f1ea;
  --surface3:  #ede9e0;
  --border:    rgba(0,0,0,.07);
  --border2:   rgba(0,0,0,.11);
  --accent:    #9b6a3e;
  --accent2:   #7d5230;
  --accent-bg: rgba(155,106,62,.09);
  --green:     #1a7a4a;
  --green-bg:  rgba(26,122,74,.08);
  --blue:      #1d5fa8;
  --blue-bg:   rgba(29,95,168,.08);
  --purple:    #5b3fa8;
  --purple-bg: rgba(91,63,168,.08);
  --orange:    #b85c00;
  --orange-bg: rgba(184,92,0,.08);
  --teal:      #0f766e;
  --teal-bg:   rgba(15,118,110,.08);
  --red:       #c0392b;
  --red-bg:    rgba(192,57,43,.07);
  --red-border:rgba(192,57,43,.2);
  --text:      #1c1917;
  --text2:     #6b6560;
  --text3:     #a09890;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Noto Sans Thai', sans-serif;
  --r:  8px; --r2: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow:    0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  box-shadow:var(--shadow-lg);padding:40px 36px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-mark{width:56px;height:56px;border-radius:14px;background:var(--accent);
  margin:0 auto 12px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:18px;color:#fff;
  box-shadow:0 4px 16px rgba(155,106,62,.3);}
.login-title{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);}
.field{margin-bottom:14px;}
.field-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.field input{width:100%;padding:10px 14px;font-size:14px;font-family:var(--sans);
  border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);
  color:var(--text);outline:none;transition:all .15s;}
.field input:focus{border-color:var(--accent);background:var(--surface);
  box-shadow:0 0 0 3px rgba(155,106,62,.1);}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--sans);
  cursor:pointer;transition:all .15s;margin-top:4px;}
.login-btn:hover{background:var(--accent2);}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.5;cursor:default;}
.login-err{margin-top:12px;padding:10px 14px;background:var(--red-bg);
  border:1px solid var(--red-border);border-radius:var(--r);
  font-size:13px;color:var(--red);display:none;}
.login-err.show{display:block;}
.login-loading{text-align:center;font-size:13px;color:var(--text3);margin-top:12px;display:none;}
.login-loading.show{display:block;}

/* ── HOME ── */
.home-page{display:none;min-height:100vh;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:11px;color:#fff;}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-time{font-size:11px;color:var(--text3);font-family:var(--mono);}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 12px;
  border:1px solid var(--border2);border-radius:20px;background:var(--surface2);}
.user-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.av-admin{background:var(--purple);}
.av-office{background:var(--blue);}
.av-driver{background:var(--green);}
.user-name{font-size:12px;font-weight:700;}
.user-role-lbl{font-size:11px;color:var(--text3);}
.logout-btn{padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:12px;font-weight:600;color:var(--text2);background:transparent;
  cursor:pointer;font-family:var(--sans);transition:all .15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}

/* BODY */
.home-body{padding:24px 20px;max-width:960px;margin:0 auto;}
.greeting-title{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px;}
.greeting-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.section{margin-bottom:24px;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--text3);margin-bottom:10px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
.app-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px 12px 16px;text-align:center;cursor:pointer;text-decoration:none;
  display:block;transition:all .15s;box-shadow:var(--shadow-sm);}
.app-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-2px);}
.app-card:active{transform:translateY(0);}
.app-icon{width:46px;height:46px;border-radius:12px;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;font-size:21px;}
.ic-blue{background:var(--blue-bg);}
.ic-green{background:var(--green-bg);}
.ic-purple{background:var(--purple-bg);}
.ic-orange{background:var(--orange-bg);}
.ic-teal{background:var(--teal-bg);}
.ic-accent{background:var(--accent-bg);}
.app-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.app-desc{font-size:11px;color:var(--text3);}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--text);color:var(--surface);border-radius:var(--r);
  padding:10px 20px;font-size:13px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index:999;pointer-events:none;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .hdr-time{display:none;}
  .login-card{padding:28px 20px;}
  .card-grid{grid-template-columns:repeat(2,1fr);}
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-mark">ZN</div>
      <div class="login-title">ห้างหุ้นส่วนจำกัด ซูนิค</div>
      <div class="login-sub">ระบบจัดการส่งสินค้า</div>
    </div>
    <div class="field">
      <label class="field-label">ชื่อผู้ใช้</label>
      <input type="text" id="inputUser" placeholder="username"
        autocomplete="username" autocapitalize="none" spellcheck="false">
    </div>
    <div class="field">
      <label class="field-label">รหัสผ่าน</label>
      <input type="password" id="inputPass" placeholder="••••••"
        autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-loading" id="loginLoading">กำลังตรวจสอบ...</div>
  </div>
</div>

<!-- HOME PAGE -->
<div class="home-page" id="homePage">
  <header class="header">
    <div class="hdr-left">
      <div class="logo-mark">ZN</div>
      <div class="logo-text">ซูนิค</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-time" id="hdrTime"></div>
      <div class="user-chip">
        <div class="user-av" id="userAv"></div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-role-lbl" id="userRoleLbl"></div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </header>
  <div class="home-body">
    <div class="greeting-title" id="greetTitle"></div>
    <div class="greeting-sub" id="greetSub"></div>
    <div id="launcher"></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// GAS deploy URL — inject by template
var BASE_URL = ZUNIC_CONFIG.BASE_URL;

// ── PAGE DEFINITIONS ─────────────────────────────────────────────────────────
var PAGES = {
  jobboard:  {name:'Job Board',     desc:'จัดตารางงาน',     icon:'📋', color:'ic-blue'  },
  return:    {name:'รับงานคืน',     desc:'บันทึกผลส่ง',     icon:'🌆', color:'ic-orange'},
  dashboard: {name:'Dashboard',     desc:'รายงานภาพรวม',    icon:'📊', color:'ic-purple'},
  mileage_A: {name:'ไมล์รถ O',      desc:'บันทึกไมล์เช้า', icon:'📍', color:'ic-teal'  },
  mileage_B: {name:'ไมล์รถ M',      desc:'บันทึกไมล์เช้า', icon:'📍', color:'ic-teal'  },
  mileage_C: {name:'ไมล์รถ N',      desc:'บันทึกไมล์เช้า', icon:'📍', color:'ic-teal'  },
  fuel_A:    {name:'น้ำมัน O',       desc:'บันทึกการเติม',  icon:'⛽', color:'ic-green' },
  fuel_B:    {name:'น้ำมัน M',       desc:'บันทึกการเติม',  icon:'⛽', color:'ic-green' },
  fuel_C:    {name:'น้ำมัน N',       desc:'บันทึกการเติม',  icon:'⛽', color:'ic-green' }
};

// ── ROLE → SECTIONS ──────────────────────────────────────────────────────────
// NOTE: admin สามารถกำหนด pages ของแต่ละ role ได้ใน Master_Users sheet
// โครงสร้างนี้เป็น fallback ถ้าไม่ได้กำหนดใน sheet
var ROLE_DEFAULTS = {
  admin:    {label:'ผู้ดูแลระบบ',       avCls:'av-admin',
             sections:[
               {label:'งานประจำวัน',          pages:['jobboard','return','dashboard']},
               {label:'คนขับ — บันทึกไมล์',   pages:['mileage_A','mileage_B','mileage_C']},
               {label:'คนขับ — น้ำมัน',       pages:['fuel_A','fuel_B','fuel_C']}
             ]},
  office:   {label:'เจ้าหน้าที่ออฟฟิศ',  avCls:'av-office',
             sections:[
               {label:'งานประจำวัน', pages:['jobboard','return','dashboard']}
             ]},
  driver_A: {label:'คนขับ O', avCls:'av-driver',
             sections:[{label:'งานของฉัน', pages:['mileage_A','fuel_A']}]},
  driver_B: {label:'คนขับ M', avCls:'av-driver',
             sections:[{label:'งานของฉัน', pages:['mileage_B','fuel_B']}]},
  driver_C: {label:'คนขับ N', avCls:'av-driver',
             sections:[{label:'งานของฉัน', pages:['mileage_C','fuel_C']}]}
};

function pageUrl(key) {
  if (key.indexOf('mileage_') === 0) return BASE_URL + '?page=mileage&driver=' + key.slice(8);
  if (key.indexOf('fuel_')    === 0) return BASE_URL + '?page=fuel&driver='    + key.slice(5);
  return BASE_URL + '?page=' + key;
}

// ── SESSION ───────────────────────────────────────────────────────────────────
function saveSession(d){ try{localStorage.setItem('znuser',JSON.stringify(d));}catch(e){} }
function loadSession(){ try{var s=localStorage.getItem('znuser');return s?JSON.parse(s):null;}catch(e){return null;} }
function clearSession(){ try{localStorage.removeItem('znuser');}catch(e){} }

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin() {
  var u = document.getElementById('inputUser').value.trim();
  var p = document.getElementById('inputPass').value;
  if (!u || !p) { showErr('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
  setBusy(true);
  callGAS('login', { u: u, p: p })
    .then(function(res) {
      setBusy(false);
      if (res && res.ok) { saveSession(res); showHome(res); }
      else showErr((res && res.msg) ? res.msg : 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
    })
    .catch(function(e) {
      setBusy(false);
      showErr('เกิดข้อผิดพลาด: ' + (e.message || e));
    });
}

function setBusy(on) {
  document.getElementById('loginBtn').disabled = on;
  document.getElementById('loginLoading').className = 'login-loading' + (on ? ' show' : '');
  if (!on) return;
  document.getElementById('loginErr').className = 'login-err';
}

function showErr(msg) {
  var el = document.getElementById('loginErr');
  el.textContent = msg; el.className = 'login-err show';
}

// ── SHOW HOME ─────────────────────────────────────────────────────────────────
function showHome(user) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('homePage').style.display  = 'block';
  document.title = 'ซูนิค — หน้าหลัก';

  // หา role config — ถ้า GAS ส่ง sections มาด้วยให้ใช้เลย, ถ้าไม่มีใช้ default
  var rd = (user.sections && user.sections.length)
    ? {label: user.roleLabel || user.role, avCls: avClass(user.role), sections: user.sections}
    : (ROLE_DEFAULTS[user.role] || ROLE_DEFAULTS['office']);

  // header
  var av = document.getElementById('userAv');
  av.textContent = (user.displayName || user.username || '?')[0].toUpperCase();
  av.className = 'user-av ' + rd.avCls;
  document.getElementById('userName').textContent    = user.displayName || user.username;
  document.getElementById('userRoleLbl').textContent = rd.label;

  // greeting
  var now = new Date();
  var h = now.getHours();
  var g = h < 12 ? 'สวัสดีตอนเช้า ☀️' : h < 17 ? 'สวัสดีตอนบ่าย 🌤' : 'สวัสดีตอนเย็น 🌆';
  document.getElementById('greetTitle').textContent = g + ', ' + (user.displayName || user.username);
  document.getElementById('greetSub').textContent   = thaiDate(now) + ' · เวลางาน 09:30 – 15:00';

  // launcher
  var html = '';
  rd.sections.forEach(function(sec) {
    html += '<div class="section"><div class="section-label">' + sec.label + '</div><div class="card-grid">';
    sec.pages.forEach(function(pk) {
      var pg = PAGES[pk]; if (!pg) return;
      html += '<a class="app-card" href="' + pageUrl(pk) + '" target="_blank">';
      html += '<div class="app-icon ' + pg.color + '">' + pg.icon + '</div>';
      html += '<div class="app-name">' + pg.name + '</div>';
      html += '<div class="app-desc">' + pg.desc + '</div>';
      html += '</a>';
    });
    html += '</div></div>';
  });
  document.getElementById('launcher').innerHTML = html;

  startClock();
}

function avClass(role) {
  if (role === 'admin') return 'av-admin';
  if (role === 'office') return 'av-office';
  return 'av-driver';
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function doLogout() {
  clearSession(); stopClock();
  document.getElementById('homePage').style.display  = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('inputPass').value = '';
  document.getElementById('loginErr').className = 'login-err';
  document.title = 'ซูนิค — เข้าสู่ระบบ';
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
var _clk = null;
function pad2(n){ return n < 10 ? '0'+n : ''+n; }
function thaiDate(d) {
  var M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var W=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  return W[d.getDay()]+'ที่ '+d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543);
}
function tickClock() {
  var n=new Date();
  var el=document.getElementById('hdrTime');
  if(el) el.textContent = thaiDate(n)+' · '+pad2(n.getHours())+':'+pad2(n.getMinutes())+':'+pad2(n.getSeconds());
}
function startClock(){ tickClock(); _clk=setInterval(tickClock,1000); }
function stopClock(){ if(_clk){clearInterval(_clk);_clk=null;} }

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('inputUser').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('inputPass').focus();
});
document.getElementById('inputPass').addEventListener('keydown',function(e){
  if(e.key==='Enter') doLogin();
});

// ตรวจ session เดิม
var sess = loadSession();
if(sess && sess.ok && sess.role) showHome(sess);
</script>
</body>
</html>
