<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #cbd5e1;background:#fff;color:#64748b;transition:all .15s;}
  .pill.active{background:#E6F1FB;border-color:#85B7EB;color:#0C447C;}
  .drv-pill{width:30px;height:30px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid #cbd5e1;color:#64748b;background:#fff;}
  .drv-pill.on-a{background:#E6F1FB;border-color:#85B7EB;color:#0C447C;}
  .drv-pill.on-b{background:#EAF3DE;border-color:#97C459;color:#27500A;}
  .drv-pill.on-c{background:#FAEEDA;border-color:#EF9F27;color:#633806;}
  .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px;}
  .stat-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e2e8f0;}
  .stat-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
  .stat-val{font-size:22px;font-weight:700;color:#0f172a;}
  .stat-unit{font-size:12px;color:#94a3b8;margin-top:2px;}
  .card{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:12px;border:1px solid #e2e8f0;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-title{font-size:14px;font-weight:700;}
  .toggle-group{display:flex;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden;}
  .tg-btn{padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#64748b;border:none;}
  .tg-btn.active{background:#E6F1FB;color:#0C447C;}
  .drv-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px;}
  .drv-card{border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;background:#fff;}
  .drv-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .badge{width:32px;height:32px;border-radius:8px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ba{background:#E6F1FB;color:#0C447C;}
  .bb{background:#EAF3DE;color:#27500A;}
  .bc{background:#FAEEDA;color:#633806;}
  .drv-name{font-size:13px;font-weight:700;}
  .drv-plate{font-size:11px;color:#64748b;}
  .drv-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ds{background:#f8fafc;border-radius:8px;padding:8px 10px;}
  .ds-label{font-size:10px;color:#94a3b8;margin-bottom:2px;}
  .ds-val{font-size:15px;font-weight:700;}
  .ds-unit{font-size:10px;color:#94a3b8;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:64px;font-size:12px;color:#64748b;}
  .bar-track{flex:1;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width .4s cubic-bezier(.4,0,.2,1);}
  .bar-val{width:90px;font-size:12px;font-weight:700;text-align:right;}
  .good{color:#27500A;}
  .warn{color:#A32D2D;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;padding:7px 8px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:700;color:#64748b;background:#f8fafc;}
  td{padding:7px 8px;border-bottom:1px solid #f1f5f9;}
  tr:last-child td{border-bottom:none;}
  .mb{width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
  .empty{text-align:center;padding:20px;color:#94a3b8;font-size:12px;}
  .note{font-size:11px;color:#94a3b8;margin-top:8px;}
  @media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr;}.drv-cards{grid-template-columns:1fr;}}
  </style>
  <div class="filter-row">
    <div style="display:flex;gap:4px;">
        <div class="pill active" data-range="month" onclick="FD.setRange(this)">เดือนนี้</div>
            <div class="pill" data-range="lastmonth" onclick="FD.setRange(this)">เดือนที่แล้ว</div>
                <div class="pill" data-range="year" onclick="FD.setRange(this)">รายปี</div>
                    <div class="pill" data-range="all" onclick="FD.setRange(this)">ทั้งหมด</div>
                      </div>
                        <div style="display:flex;gap:6px;">
                            <div class="drv-pill on-a" data-drv="A" onclick="FD.toggleDrv(this)">A</div>
                                <div class="drv-pill on-b" data-drv="B" onclick="FD.toggleDrv(this)">B</div>
                                    <div class="drv-pill on-c" data-drv="C" onclick="FD.toggleDrv(this)">C</div>
                                      </div>
                                        <div style="font-size:12px;color:#94a3b8;" id="fd-sub"></div>
                                        </div>
                                        <div class="stat-grid">
                                          <div class="stat-card"><div class="stat-label">ลิตรรวม</div><div class="stat-val" id="fd-liters">—</div><div class="stat-unit">ลิตร</div></div>
                                            <div class="stat-card"><div class="stat-label">ค่าน้ำมันรวม</div><div class="stat-val" id="fd-amount">—</div><div class="stat-unit">บาท</div></div>
                                              <div class="stat-card"><div class="stat-label">ราคาเฉลี่ย</div><div class="stat-val" id="fd-ppl">—</div><div class="stat-unit">บาท/ลิตร</div></div>
                                                <div class="stat-card"><div class="stat-label">กม./ลิตร เฉลี่ย</div><div class="stat-val" id="fd-kpl">—</div><div class="stat-unit">กม./ลิตร</div></div>
                                                </div>
                                                <div class="drv-cards" id="fd-drvcards"></div>
                                                <div class="card">
                                                  <div class="card-head">
                                                      <div class="card-title">เปรียบเทียบประสิทธิภาพ</div>
                                                          <div class="toggle-group">
                                                                <button class="tg-btn active" id="fd-btn-kml" onclick="FD.setMetric('kml')">กม./ลิตร</button>
                                                                      <button class="tg-btn" id="fd-btn-kmb" onclick="FD.setMetric('kmb')">กม./บาท</button>
                                                                          </div>
                                                                            </div>
                                                                              <div id="fd-bar"></div>
                                                                                <div class="note" id="fd-note"></div>
                                                                                </div>
                                                                                <div class="card">
                                                                                  <div class="card-title" style="margin-bottom:12px;">รายการน้ำมันล่าสุด</div>
                                                                                    <table>
                                                                                        <thead><tr><th>วันที่</th><th>คนขับ</th><th>ปั๊ม</th><th>ลิตร</th><th>ยอด (฿)</th><th>฿/ล.</th><th>กม.วิ่ง</th><th>กม./ล.</th><th>กม./฿</th></tr></thead>
                                                                                            <tbody id="fd-table"></tbody>
                                                                                              </table>
                                                                                              </div>
                                                                                              <script src="config.js"></script>
                                                                                              <script>
                                                                                              window.__tabInit = function() {
                                                                                                if (window.FD && window.FD._ready) return;
                                                                                                  window.FD = (function(){
                                                                                                      var RAW = null;
                                                                                                          var range = 'month';
                                                                                                              var metric = 'kml';
                                                                                                                  var activeDrv = {A:true,B:true,C:true};
                                                                                                                      var BADGE = {A:'ba',B:'bb',C:'bc'};
                                                                                                                          var COLORS = {A:'#378ADD',B:'#639922',C:'#BA7517'};
                                                                                                                              function fmt(n,d){ return n==null?'—':n.toLocaleString('th',{minimumFractionDigits:d||0,maximumFractionDigits:d||0}); }
                                                                                                                                  function getRange(){
                                                                                                                                        var now=new Date(),y=now.getFullYear(),m=now.getMonth();
                                                                                                                                              if(range==='month') return {from:new Date(y,m,1),to:new Date(y,m+1,0)};
                                                                                                                                                    if(range==='lastmonth') return {from:new Date(y,m-1,1),to:new Date(y,m,0)};
                                                                                                                                                          if(range==='year') return {from:new Date(y,0,1),to:new Date(y,11,31)};
                                                                                                                                                                return {from:new Date('2000-01-01'),to:new Date('2099-12-31')};
                                                                                                                                                                    }
                                                                                                                                                                        function inRange(d){ var r=getRange(),dt=new Date(d); return dt>=r.from&&dt<=r.to; }
                                                                                                                                                                            function render(){
                                                                                                                                                                                  if(!RAW) return;
                                                                                                                                                                                        var fuel=RAW.fuel.filter(function(r){ return inRange(r.date)&&activeDrv[r.driver]; });
                                                                                                                                                                                              var eff=RAW.efficiency.filter(function(r){ return inRange(r.date)&&activeDrv[r.driver]; });
                                                                                                                                                                                                    var totalL=fuel.reduce(function(s,r){return s+r.liters;},0);
                                                                                                                                                                                                          var totalA=fuel.reduce(function(s,r){return s+r.amount;},0);
                                                                                                                                                                                                                var ev=eff.filter(function(r){return r.kpl;});
                                                                                                                                                                                                                      var avgKpl=ev.length?ev.reduce(function(s,r){return s+r.kpl;},0)/ev.length:null;
                                                                                                                                                                                                                            document.getElementById('fd-liters').textContent=fmt(totalL,1);
                                                                                                                                                                                                                                  document.getElementById('fd-amount').textContent=fmt(totalA,0);
                                                                                                                                                                                                                                        document.getElementById('fd-ppl').textContent=totalL>0?fmt(totalA/totalL,2):'—';
                                                                                                                                                                                                                                              document.getElementById('fd-kpl').textContent=avgKpl?fmt(avgKpl,2):'—';
                                                                                                                                                                                                                                                    var dr=getRange();
                                                                                                                                                                                                                                                          document.getElementById('fd-sub').textContent=dr.from.toLocaleDateString('th-TH')+' – '+dr.to.toLocaleDateString('th-TH');
                                                                                                                                                                                                                                                                var drvHtml='';
                                                                                                                                                                                                                                                                      ['A','B','C'].forEach(function(d){
                                                                                                                                                                                                                                                                              if(!activeDrv[d]) return;
                                                                                                                                                                                                                                                                                      var df=fuel.filter(function(r){return r.driver===d;});
                                                                                                                                                                                                                                                                                              var de=eff.filter(function(r){return r.driver===d&&r.kpl;});
                                                                                                                                                                                                                                                                                                      var L=df.reduce(function(s,r){return s+r.liters;},0);
                                                                                                                                                                                                                                                                                                              var A=df.reduce(function(s,r){return s+r.amount;},0);
                                                                                                                                                                                                                                                                                                                      var kpl=de.length?de.reduce(function(s,r){return s+r.kpl;},0)/de.length:null;
                                                                                                                                                                                                                                                                                                                              var kpb=de.length?de.reduce(function(s,r){return s+r.kpb;},0)/de.length:null;
                                                                                                                                                                                                                                                                                                                                      var miles=RAW.mileage.filter(function(r){return r.driver===d&&r.plate;});
                                                                                                                                                                                                                                                                                                                                              var plate=miles.length?miles[miles.length-1].plate:'—';
                                                                                                                                                                                                                                                                                                                                                      drvHtml+='<div class="drv-card"><div class="drv-head"><div class="badge '+BADGE[d]+'">'+d+'</div>'
                                                                                                                                                                                                                                                                                                                                                                +'<div><div class="drv-name">คนขับ '+d+'</div><div class="drv-plate">'+plate+'</div></div></div>'
                                                                                                                                                                                                                                                                                                                                                                          +'<div class="drv-stats">'
                                                                                                                                                                                                                                                                                                                                                                                    +'<div class="ds"><div class="ds-label">น้ำมัน</div><div class="ds-val">'+fmt(L,1)+' <span class="ds-unit">ล.</span></div></div>'
                                                                                                                                                                                                                                                                                                                                                                                              +'<div class="ds"><div class="ds-label">ค่าน้ำมัน</div><div class="ds-val">'+fmt(A,0)+' <span class="ds-unit">฿</span></div></div>'
                                                                                                                                                                                                                                                                                                                                                                                                        +'<div class="ds"><div class="ds-label">กม./ลิตร</div><div class="ds-val '+(kpl&&kpl<6.5?'warn':'good')+'">'+fmt(kpl,2)+'</div></div>'
                                                                                                                                                                                                                                                                                                                                                                                                                  +'<div class="ds"><div class="ds-label">กม./บาท</div><div class="ds-val">'+fmt(kpb,3)+'</div></div>'
                                                                                                                                                                                                                                                                                                                                                                                                                            +'</div></div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('fd-drvcards').innerHTML=drvHtml||'<div class="empty">ไม่มีข้อมูล</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                              renderBar(eff);
                                                                                                                                                                                                                                                                                                                                                                                                                                                    renderTable(eff);
                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                            function renderBar(eff){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  var html='',maxVal=0,vals={};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ['A','B','C'].forEach(function(d){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!activeDrv[d]) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        var de=eff.filter(function(r){return r.driver===d&&(metric==='kml'?r.kpl:r.kpb);});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!de.length){vals[d]=null;return;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        var v=de.reduce(function(s,r){return s+(metric==='kml'?r.kpl:r.kpb);},0)/de.length;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                vals[d]=v; if(v>maxVal) maxVal=v;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ['A','B','C'].forEach(function(d){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(!activeDrv[d]) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            var v=vals[d],pct=v&&maxVal?Math.round((v/maxVal)*90):0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    var valStr=v?(metric==='kml'?fmt(v,2)+' กม./ล.':fmt(v,3)+' กม./฿'):'—';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            html+='<div class="bar-row"><div class="bar-label">คนขับ '+d+'</div>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+COLORS[d]+';"></div></div>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                +'<div class="bar-val">'+valStr+'</div></div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('fd-bar').innerHTML=html||'<div class="empty">ไม่มีข้อมูล</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function renderTable(eff){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          var rows=eff.slice().sort(function(a,b){return a.date<b.date?1:-1;}).slice(0,30);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('fd-table').innerHTML=rows.length?rows.map(function(r){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        var ppl=r.amount&&r.liters?r.amount/r.liters:null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                return '<tr><td>'+r.date+'</td>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          +'<td><span class="mb '+BADGE[r.driver]+'">'+r.driver+'</span></td>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    +'<td>'+r.station+'</td><td>'+fmt(r.liters,1)+'</td><td>'+fmt(r.amount,0)+'</td>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              +'<td>'+fmt(ppl,2)+'</td><td>'+(r.km?fmt(r.km,0):'—')+'</td>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        +'<td>'+(r.kpl?fmt(r.kpl,2):'—')+'</td>'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  +'<td>'+(r.kpb?fmt(r.kpb,3):'—')+'</td></tr>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }).join(''):'<tr><td colspan="9" class="empty">ไม่มีข้อมูล</td></tr>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                callGAS('getDashboardData')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .then(function(data){ RAW=data; render(); })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .catch(function(err){ console.error(err.message); });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      return {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            _ready: true,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  setRange: function(el){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  el.classList.add('active'); range=el.dataset.range; render();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              toggleDrv: function(el){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      var d=el.dataset.drv; activeDrv[d]=!activeDrv[d];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              el.classList.toggle('on-'+d.toLowerCase(),activeDrv[d]); render();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          setMetric: function(m){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  metric=m;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('fd-btn-kml').classList.toggle('active',m==='kml');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById('fd-btn-kmb').classList.toggle('active',m==='kmb');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if(RAW) renderBar(RAW.efficiency.filter(function(r){return inRange(r.date)&&activeDrv[r.driver];}));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      })();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      window.__tabInit();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <\/script>
